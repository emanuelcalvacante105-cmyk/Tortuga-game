<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Tortuga Desert</title>
  <style>
    body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #0d0d0d; overflow: hidden; font-family: 'Segoe UI', sans-serif; touch-action: none; }
    canvas { background: linear-gradient(to bottom, #1a2a6c, #b21f1f, #fdbb2d); border-radius: 8px; max-width: 100%; max-height: 100%; cursor: pointer; touch-action: none; }
    .score-board { position: absolute; top: 10px; color: #fff; font-size: 24px; font-weight: bold; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); pointer-events: none; }
  </style>
</head>
<body>
  <div class="score-board">PONTOS: <span id="score">0</span></div>
  <canvas id="gameCanvas"></canvas>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreElement = document.getElementById("score");
    canvas.width = 1000; canvas.height = 450;
    let score = 0; let gameActive = true; let speed = 7; let frame = 0;
    const tortuga = { x: 120, y: 340, width: 80, height: 45, dy: 0, gravity: 0.7, jumpForce: 14, grounded: false };
    const obstacles = [];
    const clouds = Array.from({ length: 5 }, () => ({ x: Math.random() * 1200, y: 40 + Math.random() * 80, s: 0.2 + Math.random() * 0.5 }));

    function drawTurtle() {
      ctx.save(); ctx.translate(tortuga.x, tortuga.y);
      let walk = Math.sin(frame * 0.15) * 8;
      ctx.fillStyle = "#6b8e23";
      ctx.beginPath(); ctx.ellipse(15, 35 + (tortuga.grounded ? -walk / 2 : 0), 8, 12, Math.PI / 4, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(55, 35 + (tortuga.grounded ? walk / 2 : 0), 10, 14, -Math.PI / 4, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#8fb339";
      ctx.beginPath(); ctx.quadraticCurveTo(70, 20, 85, 10); ctx.lineTo(85, 25); ctx.lineTo(70, 30); ctx.fill();
      ctx.beginPath(); ctx.ellipse(90, 10, 15, 12, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(95, 7, 4, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "black"; ctx.beginPath(); ctx.arc(97, 7, 2, 0, Math.PI * 2); ctx.fill();
      let shellGrad = ctx.createRadialGradient(40, 10, 5, 40, 20, 45);
      shellGrad.addColorStop(0, "#4d6b1d"); shellGrad.addColorStop(1, "#1b3009");
      ctx.fillStyle = shellGrad; ctx.beginPath(); ctx.moveTo(5, 30); ctx.bezierCurveTo(5, -10, 75, -10, 75, 30); ctx.closePath(); ctx.fill();
      ctx.restore();
    }

    function drawScenery() {
      // Sol e Montanhas
      ctx.fillStyle = "#fff5e1"; ctx.beginPath(); ctx.arc(850, 100, 60, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "rgba(255, 255, 255, 0.3)";
      clouds.forEach(c => { c.x -= c.s; if(c.x < -150) c.x = canvas.width + 150; ctx.beginPath(); ctx.arc(c.x, c.y, 25, 0, Math.PI * 2); ctx.arc(c.x + 30, c.y, 35, 0, Math.PI * 2); ctx.fill(); });
      ctx.fillStyle = "#3d1c1c";
      for (let i = 0; i < 3; i++) { let xPos = (i * 600 - (frame * 0.2) % 1800); ctx.beginPath(); ctx.moveTo(xPos, 385); ctx.lineTo(xPos + 300, 180); ctx.lineTo(xPos + 600, 385); ctx.fill(); }
      ctx.fillStyle = "#c27e44";
      for (let i = 0; i < 5; i++) { let xPos = (i * 300 - (frame * 3) % 1500); ctx.beginPath(); ctx.moveTo(xPos, 385); ctx.quadraticCurveTo(xPos + 150, 300, xPos + 350, 385); ctx.fill(); }
      let groundGrad = ctx.createLinearGradient(0, 385, 0, 450); groundGrad.addColorStop(0, "#d4a373"); groundGrad.addColorStop(1, "#8a5a2e");
      ctx.fillStyle = groundGrad; ctx.fillRect(0, 385, canvas.width, 65);
    }

    function drawCactus(obs) {
      ctx.save(); ctx.fillStyle = "#2d5a27";
      ctx.fillRect(obs.x, obs.y - obs.height, obs.width, obs.height);
      ctx.beginPath(); ctx.arc(obs.x + obs.width / 2, obs.y - obs.height, obs.width / 2, 0, Math.PI, true); ctx.fill();
      ctx.restore();
    }

    function update() {
      if (!gameActive) return;
      frame++;
      tortuga.dy += tortuga.gravity; tortuga.y += tortuga.dy;
      if (tortuga.y > 340) { tortuga.y = 340; tortuga.dy = 0; tortuga.grounded = true; }
      if (frame % 110 === 0) { obstacles.push({ x: canvas.width, y: 385, width: 22, height: 40 + Math.random() * 30 }); }
      for (let i = obstacles.length - 1; i >= 0; i--) {
        obstacles[i].x -= speed;
        if (tortuga.x + 60 > obstacles[i].x && tortuga.x < obstacles[i].x + obstacles[i].width && tortuga.y + 35 > obstacles[i].y - obstacles[i].height) gameActive = false;
        if (obstacles[i].x < -50) { obstacles.splice(i, 1); score++; scoreElement.innerText = score * 10; if (score % 5 === 0) speed += 0.3; }
      }
    }

    function loop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawScenery();
      obstacles.forEach(drawCactus);
      drawTurtle();
      update();
      if (gameActive) { requestAnimationFrame(loop); }
      else {
        ctx.fillStyle = "rgba(0,0,0,0.8)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#fff"; ctx.textAlign = "center"; ctx.font = "bold 40px Arial";
        ctx.fillText("FIM DA JORNADA", canvas.width / 2, canvas.height / 2);
        ctx.font = "20px Arial"; ctx.fillText("Toque para reiniciar", canvas.width / 2, canvas.height / 2 + 50);
      }
    }

    function handleInput(e) {
      if (e.cancelable) e.preventDefault();
      if (tortuga.grounded && gameActive) { tortuga.dy = -tortuga.jumpForce; tortuga.grounded = false; }
      else if (!gameActive) { location.reload(); }
    }

    window.addEventListener("mousedown", handleInput);
    window.addEventListener("touchstart", handleInput, {passive: false});
    window.addEventListener("keydown", (e) => { if(e.code === "Space") handleInput(e); });
    loop();
  </script>
</body>
</html>
